apiVersion: "v1"
kind: "Service"
metadata:
  name: {{ include "runner.fullname" . }}
  labels: {{- include "runner.labels" . | nindent 4 }}
spec:
  ports:
    - name: "api"
      port: {{ .Values.apiPort }}
    - name: "user-api"
      port: {{ .Values.userAPIPort }}
    - name: "metrics"
      port: {{ .Values.metricsPort }}
  selector: {{- include "runner.selectorLabels" . | nindent 4 }}
