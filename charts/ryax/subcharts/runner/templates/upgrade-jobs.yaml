apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "runner.fullname" . }}-scale-down
  labels: {{- include "runner.labels" . | nindent 4}}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: "rbac.authorization.k8s.io/v1"
kind: Role
metadata:
  name: {{ include "runner.fullname" . }}-scale-down
  labels: {{- include "runner.labels" . | nindent 4}}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: ["apps"]
  resources:
    - deployments
    - deployments/scale
  resourceNames:
    - {{ include "runner.fullname" . }}
  verbs:
    - get
    - update
    - patch
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: "{{ include "runner.fullname" . }}-scale-down"
  labels: {{- include "runner.labels" . | nindent 4}}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: "{{ include "runner.fullname" . }}-scale-down"
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: "{{ include "runner.fullname" . }}-scale-down"
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "runner.fullname" . }}-scale-down"
  labels: {{- include "runner.labels" . | nindent 4}}
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: "{{ include "runner.fullname" . }}-scale-down"
      labels: {{- include "runner.labels" . | nindent 8}}
    spec:
      serviceAccountName: "{{ include "runner.fullname" . }}-scale-down"
      restartPolicy: Never
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: scale-down-before-migration-job
        image: {{ .Values.upgradeJob.image }}
        command:
          - /bin/bash
          - -c
          - |
            set -e
            set -x
            set -u
            
            kubectl version
            
            echo Scale down {{ include "runner.fullname" . }} deployment to allow database migration
            kubectl scale deployment --namespace={{ .Release.Namespace }} --replicas=0 {{ include "runner.fullname" . }} || true
            echo Done!
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "runner.fullname" . }}-db-migration"
  labels: {{- include "runner.labels" . | nindent 4}}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: "{{ include "runner.fullname" . }}-db-migration"
      labels: {{- include "runner.labels" . | nindent 8}}
    spec:
      restartPolicy: Never
      securityContext:
        fsGroup: 1200
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - emptyDir:
          name: "tmp-dir"
      containers:
        - name: {{ include "runner.fullname" . | printf "%s-database-migration" }}
          image: {{ include "runner.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: "tmp-dir"
              mountPath: "/tmp"
          command:
            - "ryax-runner-update-db"
          env:
            - name: RYAX_DATASTORE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.datastoreSecret }}
                  key: "datastore-runner"
            - name: RYAX_LOG_LEVEL
              value: {{ .Values.logLevel | default .Values.global.ryax.logLevel | default "info" }}
