{{- $environment := .Values.environment | default .Values.global.tls.environment }}
{{- if eq $environment "production" }}
{{- range tuple .Release.Namespace .Values.global.ryax.userNamespace }}
---
apiVersion: "rbac.authorization.k8s.io/v1"
kind: "Role"
metadata:
  name: "dev-role"
  namespace: {{ . }}
  labels: {{- include "common-resources.labels" $ | nindent 4}}
rules:
  - apiGroups:
      - ""
      - "apps"
      - "batch"
      - "extensions"
    resources:
      - "configmaps"
      - "cronjobs"
      - "deployments"
      - "events"
      - "ingresses"
      - "jobs"
      - "pods"
      - "pods/attach"
      - "pods/exec"
      - "pods/log"
      - "pods/portforward"
      - "services"
    verbs:
      - "describe"
      - "get"
      - "list"
---
apiVersion: "rbac.authorization.k8s.io/v1"
kind: "RoleBinding"
metadata:
  name: "dev-role-binding"
  namespace: {{ . }}
  labels: {{- include "common-resources.labels" $ | nindent 4}}
roleRef:
  kind: "Role"
  name: "dev-role"
  apiGroup: "rbac.authorization.k8s.io"
subjects:
  - kind: {{ $.Values.devRoleSubject.kind }}
    name: {{ $.Values.devRoleSubject.id }}
{{- end }}
{{- else }}
---
apiVersion: "rbac.authorization.k8s.io/v1"
kind: "ClusterRole"
metadata:
  name: "dev-role"
  labels: {{- include "common-resources.labels" . | nindent 4}}
rules:
  - apiGroups:
      - "*"
    resources:
      - "*"
    verbs:
      - "*"
---
apiVersion: "rbac.authorization.k8s.io/v1"
kind: "ClusterRoleBinding"
metadata:
  name: "dev-role-binding"
  labels: {{- include "common-resources.labels" . | nindent 4}}
roleRef:
  kind: "ClusterRole"
  name: "dev-role"
  apiGroup: "rbac.authorization.k8s.io"
subjects:
  - kind: {{ .Values.devRoleSubject.kind }}
    name: {{ .Values.devRoleSubject.id }}
{{- end }}
