apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-scale-down
  labels: {{- include "studio.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: "rbac.authorization.k8s.io/v1"
kind: Role
metadata:
  name: {{ .Release.Name }}-scale-down
  labels: {{- include "studio.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [ "apps" ]
    resources:
      - deployments
      - deployments/scale
    resourceNames:
      - {{ include "studio.fullname" . }}
    verbs:
      - get
      - update
      - patch
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: "{{ .Release.Name }}-scale-down"
  labels: {{- include "studio.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: "{{ .Release.Name }}-scale-down"
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: Role
  name: "{{ .Release.Name }}-scale-down"
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-scale-down"
  labels: {{- include "studio.labels" . | nindent 4 }}
  annotations:
    # This is what defines this resource as a hook. Without this line, the
    # job is considered part of the release.
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: "{{ .Release.Name }}-scale-down"
      labels: {{- include "studio.labels" . | nindent 8 }}
    spec:
      serviceAccountName: "{{ .Release.Name }}-scale-down"
      restartPolicy: Never
      containers:
        - name: scale-down-before-migration-job
          image: {{ .Values.updaterImage }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              set -x
              set -u
              
              kubectl version
              
              echo Scale down {{ include "studio.fullname" . }} deployment to allow database migration
              kubectl scale deployment --namespace={{ .Release.Namespace }} --replicas=0 {{ include "studio.fullname" . }} || echo 'Fail to downscale ! Assuming no previews version deployed. Continue...'
              echo Done!
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-db-migration"
  labels: {{- include "studio.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-upgrade
    "helm.sh/hook-weight": "2"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      name: "{{ .Release.Name }}-db-migration"
      labels: {{- include "studio.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      securityContext:
        fsGroup: 1200
      {{ with .Values.priorityClass }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.global.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - emptyDir:
          name: "tmp-dir"
      containers:
        - name: {{ include "studio.fullname" . | printf "%s-database-migration" }}
          image: {{ include "studio.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          volumeMounts:
            - name: "tmp-dir"
              mountPath: "/tmp"
          command:
            - "ryax-studio-update-db"
          env:
            - name: RYAX_DATASTORE
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.datastoreSecret }}
                  key: "datastore-studio"
            - name: RYAX_LOG_LEVEL
              value: {{ .Values.logLevel | default .Values.global.ryax.logLevel | default "warning" }}
